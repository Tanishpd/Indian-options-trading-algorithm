name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev,paper]"
      - name: Test
        run: python -m pytest -q

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Debug OIDC claims (temporary)
        run: |
          RESP=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com")
          PAYLOAD=$(echo "$RESP" | python3 -c "import sys,json;print(json.load(sys.stdin)['value'].split('.')[1])")
          PAD=$(python3 -c "p='$PAYLOAD';print(p + '='*(-len(p)%4))")
          echo "$PAD" | base64 -d | python3 -c "import sys,json;c=json.load(sys.stdin);print({k:c[k] for k in ('iss','aud','sub','repository','ref') if k in c})"
      - name: Authenticate to AWS (OIDC, keyless)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::863760760673:role/optionsbot-deploy
          aws-region: ap-south-1
      - name: Deploy via SSM (updates code, runs tests on the box, never restarts a live session)
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids i-0e245c2199134eb12 \
            --document-name AWS-RunShellScript \
            --comment "deploy ${GITHUB_SHA::7}" \
            --parameters '{"commands":["runuser -u ubuntu -- bash -lc '\''cd /home/ubuntu/options && git fetch -q origin main && git reset -q --hard origin/main && .venv/bin/pip install -q -e .[dev,paper] && .venv/bin/python -m pytest -q && git log --format=\"deployed: %h %s\" -1'\''"]}' \
            --query Command.CommandId --output text)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-0e245c2199134eb12 --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                echo "deploy failed:"; aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-0e245c2199134eb12 --query StandardErrorContent --output text
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-0e245c2199134eb12 --query StandardOutputContent --output text | tail -10
                exit 1 ;;
            esac
            sleep 5
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id i-0e245c2199134eb12 --query StandardOutputContent --output text | tail -4
